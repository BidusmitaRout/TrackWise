<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  
  <link rel='icon' type='image/svg+xml' href='favicon.svg' />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  
  <div class="nav">
    <div class="container inner" style="justify-content:space-between">
      <a class="logo" href="index.html"><span class="mark"></span>TrackWise</a>
      <div id="right-controls" style="display:flex;gap:12px;align-items:center">
        <div style="position:relative">
          <button id="nav-menu-toggle" class="btn" aria-expanded="false" aria-controls="nav-menu">&#9776;</button>
          <div id="nav-menu" class="user-dropdown-menu" style="display:none;right:0;left:auto;"></div>
        </div>
        <button id="mode-toggle-btn" title="Toggle Dark/Light Mode" class="btn">&#9728;</button>
        <div id="auth-area" style="display:flex;align-items:center;gap:8px"></div>
      </div>
    </div>
  </div>

  <div class="container section fade-in">
    <h1>&#128100; Your Profile</h1>
    <p class="lead">Manage your account and learning preferences.</p>

    <div id="profileContent" style="display:grid;gap:16px"></div>
  </div>

  <div class="footer fade-in" style="margin-top:40px">
    <div class="container cols">
      <div>
        <div class="logo"><span class="mark"></span>TrackWise</div>
        <p class="muted">We are here to help you learn, track, and grow.</p>
      </div>
    </div>
    <div class="container" style="margin-top:18px;color:#6b7280">&copy; 2025 TrackWise. All rights reserved.</div>
  </div>

  <div class="modal-backdrop" id="mainModal" onclick="if(event.target.id === 'mainModal') closeModal()">
    <div class="card modal-content"></div>
  </div>

  <script src="theme.js"></script>
  <script src="script.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const user = getAuthUser();
      // If no user is signed in, show a helpful prompt instead of redirecting.
      if (!user) {
        const container = document.getElementById('profileContent');
        container.innerHTML = `
          <div class="card fade-in" style="text-align:center;padding:30px">
            <h3>You're not signed in</h3>
            <p class="muted" style="margin-top:8px">To view your profile, please sign in or create an account.</p>
            <div style="margin-top:14px;display:flex;gap:10px;justify-content:center">
              <a class="btn" href="login.html">Login</a>
              <a class="btn brand" href="signup.html">Sign up</a>
            </div>
            <div style="margin-top:14px;color:var(--muted);font-size:13px">Or seed a test user in the browser console for quick testing.</div>
          </div>
        `;
        return;
      }

      loadCourseData();
      renderProfile(user);
    });

    function renderProfile(user) {
      const container = document.getElementById('profileContent');
      const preferences = JSON.parse(localStorage.getItem('trackwisePreferences') || '{}');
      // Friendly avatar (initials)
      const initials = (user.name || 'U').split(' ').map(s => s[0]).slice(0,2).join('').toUpperCase();
      const totalHours = courseData.reduce((sum, c) => sum + (c.hoursLogged || 0), 0).toFixed(1);
      const completedCount = courseData.filter(c => c.isCompleted).length;
      const currentStreak = Math.max(...courseData.map(c => c.streak || 0), 0);

      container.innerHTML = `
        <!-- Header: Profile summary and edit -->
        <div class="card fade-in" style="display:flex;align-items:center;justify-content:space-between;gap:16px">
          <div style="display:flex;gap:14px;align-items:center">
            <div style="width:84px;height:84px;border-radius:16px;background:linear-gradient(135deg,#60a5fa,#7c3aed);display:flex;align-items:center;justify-content:center;color:white;font-weight:700;font-size:28px">${initials}</div>
            <div>
              <div style="color:var(--muted);font-size:12px">Signed in as</div>
              <div style="font-size:20px;font-weight:700;margin-top:6px">${user.name}</div>
              <div style="color:var(--muted);font-size:13px;margin-top:6px">${user.email} • ${user.phone || 'No phone'}</div>
            </div>
          </div>
          <div style="display:flex;gap:10px;align-items:center">
            <button class="btn" onclick="openEditProfile()">✏️ Edit Profile</button>
            <button class="btn" onclick="logoutUser()">🚪 Logout</button>
          </div>
        </div>

        <!-- Learning Goals -->
        <div class="card fade-in">
          <h3>🎯 Learning Goals</h3>
          <div style="display:grid;gap:10px;margin-top:16px">
            <div>
              <label style="font-size:12px;color:var(--muted)">Daily Study Goal (hours)</label>
              <input type="number" id="dailyGoal" class="input" value="${preferences.dailyGoal || 2}" min="0.5" max="12" style="margin-top:6px" />
            </div>
            <div>
              <label style="font-size:12px;color:var(--muted)">Weekly Study Goal (hours)</label>
              <input type="number" id="weeklyGoal" class="input" value="${preferences.weeklyGoal || 15}" min="1" max="100" style="margin-top:6px" />
            </div>
            <div>
              <label style="font-size:12px;color:var(--muted)">Target Courses to Complete</label>
              <input type="number" id="targetCourses" class="input" value="${preferences.targetCourses || 5}" min="1" max="50" style="margin-top:6px" />
            </div>
            <button class="btn brand" onclick="saveGoals()" style="margin-top:10px">Save Goals</button>
          </div>
        </div>

        <!-- Notification Preferences -->
        <div class="card fade-in">
          <h3>🔔 Notification Preferences</h3>
          <div style="display:grid;gap:12px;margin-top:16px">
            <label style="display:flex;align-items:center;gap:10px;cursor:pointer">
              <input type="checkbox" id="streakReminder" ${preferences.streakReminder !== false ? 'checked' : ''} />
              <span>Notify me about study streaks</span>
            </label>
            <label style="display:flex;align-items:center;gap:10px;cursor:pointer">
              <input type="checkbox" id="deadlineReminder" ${preferences.deadlineReminder !== false ? 'checked' : ''} />
              <span>Remind me about upcoming deadlines</span>
            </label>
            <label style="display:flex;align-items:center;gap:10px;cursor:pointer">
              <input type="checkbox" id="weeklyDigest" ${preferences.weeklyDigest !== false ? 'checked' : ''} />
              <span>Send me weekly learning digest</span>
            </label>
            <label style="display:flex;align-items:center;gap:10px;cursor:pointer">
              <input type="checkbox" id="achievementNotif" ${preferences.achievementNotif !== false ? 'checked' : ''} />
              <span>Notify me when I earn achievements</span>
            </label>
            <button class="btn brand" onclick="saveNotifications()" style="margin-top:10px">Save Preferences</button>
          </div>
        </div>

        <!-- Learning Statistics -->
        <div class="card fade-in">
          <h3>&#128202; Your Statistics</h3>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:16px">
            <div style="padding:12px;background:var(--panel-2);border-radius:6px;text-align:center">
              <div style="color:var(--muted);font-size:12px">Total Hours</div>
              <div style="font-size:24px;font-weight:bold;color:var(--brand);margin-top:8px">${courseData.reduce((sum, c) => sum + (c.hoursLogged || 0), 0).toFixed(1)}h</div>
            </div>
            <div style="padding:12px;background:var(--panel-2);border-radius:6px;text-align:center">
              <div style="color:var(--muted);font-size:12px">Courses Completed</div>
              <div style="font-size:24px;font-weight:bold;color:var(--brand);margin-top:8px">${courseData.filter(c => c.isCompleted).length}</div>
            </div>
            <div style="padding:12px;background:var(--panel-2);border-radius:6px;text-align:center">
              <div style="color:var(--muted);font-size:12px">Current Streak</div>
              <div style="font-size:24px;font-weight:bold;color:var(--brand);margin-top:8px">${Math.max(...courseData.map(c => c.streak || 0), 0)}🔥</div>
            </div>
            <div style="padding:12px;background:var(--panel-2);border-radius:6px;text-align:center">
              <div style="color:var(--muted);font-size:12px">Avg Progress</div>
              <div style="font-size:24px;font-weight:bold;color:var(--brand);margin-top:8px">${courseData.length ? Math.round(courseData.reduce((sum, c) => sum + c.progress, 0) / courseData.length) : 0}%</div>
            </div>
          </div>
        </div>

        <!-- Data Export -->
        <div class="card fade-in">
          <h3>📥 Export Your Data</h3>
          <div style="display:grid;gap:10px;margin-top:16px">
            <button class="btn" onclick="exportJSON()">📄 Export as JSON</button>
            <button class="btn" onclick="exportPDF()">📋 Export as PDF Report</button>
            <button class="btn" onclick="shareProgress()" style="background:var(--brand);color:white">📤 Share Progress</button>
          </div>
        </div>

        <!-- Danger Zone -->
        <div class="card fade-in" style="border-left:3px solid #ef4444">
          <h3 style="color:#ef4444">⚠️ Danger Zone</h3>
          <div style="display:grid;gap:10px;margin-top:16px">
            <button class="btn" onclick="clearAllData()" style="background:#ef4444;color:white">🗑ï¸ Clear All Data</button>
            <button class="btn" onclick="logoutUser()" style="background:#f59e0b;color:white">🚪 Logout</button>
          </div>
        </div>
      `;

      // Ensure newly-inserted .fade-in elements are observed and animated
      try { setupScrollAnimations(); } catch (e) { /* ignore if not available */ }
    }

    function saveGoals() {
      const preferences = {
        dailyGoal: document.getElementById('dailyGoal').value,
        weeklyGoal: document.getElementById('weeklyGoal').value,
        targetCourses: document.getElementById('targetCourses').value,
        streakReminder: document.getElementById('streakReminder').checked,
        deadlineReminder: document.getElementById('deadlineReminder').checked,
        weeklyDigest: document.getElementById('weeklyDigest').checked,
        achievementNotif: document.getElementById('achievementNotif').checked
      };
      localStorage.setItem('trackwisePreferences', JSON.stringify(preferences));
      alert('Goals saved successfully!');
    }

    function saveNotifications() {
      saveGoals();
    }

    function exportJSON() {
      const data = {
        user: getAuthUser(),
        courses: courseData,
        exported: new Date().toISOString()
      };
      const json = JSON.stringify(data, null, 2);
      const blob = new Blob([json], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'trackwise-data.json';
      a.click();
    }

    function exportPDF() {
      const user = getAuthUser();
      const totalHours = courseData.reduce((sum, c) => sum + (c.hoursLogged || 0), 0);
      const completed = courseData.filter(c => c.isCompleted).length;
      
      let content = `TRACKWISE PROGRESS REPORT\n\n`;
      content += `User: ${user.name}\nEmail: ${user.email}\n`;
      content += `Generated: ${new Date().toLocaleDateString()}\n\n`;
      content += `=== STATISTICS ===\n`;
      content += `Total Courses: ${courseData.length}\n`;
      content += `Courses Completed: ${completed}\n`;
      content += `Total Hours Logged: ${totalHours.toFixed(1)}\n\n`;
      content += `=== COURSES ===\n`;
      courseData.forEach(c => {
        content += `- ${c.name}: ${c.progress}% (${c.difficulty || 'medium'}) - ${c.hoursLogged || 0}h\n`;
      });

      const blob = new Blob([content], { type: 'text/plain' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'trackwise-report.txt';
      a.click();
    }

    function shareProgress() {
      const user = getAuthUser();
      const text = `Check out my progress on TrackWise! 🚀 I've completed ${courseData.filter(c => c.isCompleted).length} courses and logged ${courseData.reduce((sum, c) => sum + (c.hoursLogged || 0), 0).toFixed(1)} hours of learning. Join me at TrackWise!`;
      
      if (navigator.share) {
        navigator.share({ title: 'TrackWise Progress', text: text });
      } else {
        alert('Progress:\n' + text);
      }
    }

    function clearAllData() {
      if (confirm('⚠️ This will delete ALL your data. Are you sure?\nThis cannot be undone!')) {
        localStorage.removeItem('trackWiseCourses');
        localStorage.removeItem('trackwiseTasks');
        localStorage.removeItem('trackwisePreferences');
        alert('All data cleared!');
        window.location.href = 'tracker.html';
      }
    }

    // Edit profile: open modal with editable fields
    function openEditProfile() {
      const user = getAuthUser();
      if (!user) return alert('No user found');

      const form = `
        <div style="max-width:520px">
          <h3>Edit Profile</h3>
          <div style="display:grid;gap:8px;margin-top:12px">
            <label style="font-size:12px;color:var(--muted)">Full name</label>
            <input id="edit_name" class="input" value="${(user.name||'').replace(/"/g,'&quot;')}" />

            <label style="font-size:12px;color:var(--muted)">Email</label>
            <input id="edit_email" class="input" value="${(user.email||'').replace(/"/g,'&quot;')}" />

            <label style="font-size:12px;color:var(--muted)">Phone</label>
            <input id="edit_phone" class="input" value="${(user.phone||'')}" />

            <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:10px">
              <button class="btn" onclick="closeModal()">Cancel</button>
              <button class="btn brand" onclick="saveProfileEdits()">Save</button>
            </div>
          </div>
        </div>
      `;

      showModal(form);
    }

    function saveProfileEdits() {
      const name = document.getElementById('edit_name').value.trim();
      const email = document.getElementById('edit_email').value.trim().toLowerCase();
      const phone = document.getElementById('edit_phone').value.trim();

      if (!name || !email) return alert('Name and email are required.');
      if (!isValidEmail(email)) return alert('Please enter a valid email address.');

      const user = getAuthUser() || {};
      user.name = name;
      user.email = email;
      user.phone = phone;

      setAuthUser(user);
      closeModal();
      renderProfile(user);
      alert('Profile updated successfully.');
    }
  </script>
</body>
</html>
